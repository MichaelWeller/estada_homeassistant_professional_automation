name: "Estada Professional Automation"
version: "0.2.5"
slug: "estada_professional_automation"
description: "Professional TypeScript automation engine for Home Assistant."
maintainer: "Michael Weller"
url: "https://github.com/MichaelWeller/estada_homeassistant_professional_automation"
documentation: "https://github.com/MichaelWeller/estada_homeassistant_professional_automation/tree/main/estada_professional_automation"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false

homeassistant_api: true
hassio_api: true

ports:
  2222/tcp: 2222
  9229/tcp: 9229
  445/tcp: 445

ports_description:
  2222/tcp: "SSH/SFTP"
  9229/tcp: "Node Inspector"
  445/tcp: "Samba/SMB (optional)"

map:
  - type: homeassistant_config
    read_only: false

options:
  log_level: info
  rules_path: /config/Estada_PA
  enable_ssh: true
  ssh_port: 2222
  ssh_username: estada
  ssh_password: estada
  enable_samba: false
  samba_share_name: Estada_PA
  enable_debug: true
  debug_port: 9229

schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  rules_path: str
  enable_ssh: bool
  ssh_port: port
  ssh_username: str
  ssh_password: str
  enable_samba: bool
  samba_share_name: str
  enable_debug: bool
  debug_port: port






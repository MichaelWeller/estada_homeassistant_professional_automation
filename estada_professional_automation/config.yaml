name: "Estada Professional Automation"
version: "0.1.3"
slug: "estada_professional_automation"
description: "Professional TypeScript automation engine for Home Assistant."
maintainer: "Michael Weller"
url: "https://github.com/MichaelWeller/estada_homeassistant_professional_automation"
documentation: "https://github.com/MichaelWeller/estada_homeassistant_professional_automation/tree/main/estada_professional_automation"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false

homeassistant_api: true
hassio_api: true

ports:
  2222/tcp: 2222
  9229/tcp: 9229

ports_description:
  2222/tcp: "SFTP"
  9229/tcp: "Node Inspector"

map:
  - type: homeassistant_config
    read_only: false

options:
  log_level: info
  rules_path: /config/Estada_PA
  enable_sftp: false
  sftp_port: 2222
  sftp_username: estada
  sftp_password: ""
  enable_debug: false
  debug_port: 9229

schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  rules_path: str
  enable_sftp: bool
  sftp_port: port
  sftp_username: str
  sftp_password: password
  enable_debug: bool
  debug_port: port

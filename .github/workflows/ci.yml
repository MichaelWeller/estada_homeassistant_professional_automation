name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-addon:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: estada_professional_automation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript build
        run: npm run build
